<!DOCTYPE html>
<html class="no-js" lang="">

<head>
	<meta charset="utf-8">
	<title>color</title>
	<style>
		.wrapper_bg {
			width: 500px;
			display:block;
			padding: 5px;
		}
		._bg {
			position: relative;
			display: block;
			width: 100%;
			min-height: 30px;
			margin: 5px;
			padding:5px;
			text-align: center;
			font-size: 2rem;

		}
	</style>
</head>

<body>

<div class="wrapper_bg">
	<div class="_bg" id="bg1"></div>
	<div class="_bg" id="bg2"></div>
	<div class="_bg" id="bg3"></div>
	<div class="_bg" id="bg4"></div>
	<div class="_bg" id="bg5"></div>
	<div class="_bg" id="bg6"></div>

</div>	


<script>
	let min = 160;
	let max = 240;
	let dec = [];
	while (dec.length < 3) {
		dec.push(genCode(min, max, dec, 20));
	}

	let hex = dec.map(v => v.toString(16));
	let array = [hex, [...hex].reverse()];

	let bgAry = array.flatMap(ary =>
		ary.map((e, i) => {
			let a = [...ary];
			a.splice(i, 1);
			return e + a.join("");
		})
	);

	bgAry.sort().forEach((color, i) =>{
		document.getElementById(`bg${i + 1}`).style.setProperty('background-color', `#${color}`);
		document.getElementById(`bg${i + 1}`).innerText = color.toUpperCase();
	});
	


	// for (let i = 0; i < 6; i++) {
	// 	document.getElementById(`bg${i+1}`).style.setProperty('background-color', `#${bgAry[i]}`);
	// 	document.getElementById(`bg${i + 1}`).innerText = bgAry[i].toUpperCase();
	// }

	function genCode(min, max, array, thresh) {
		let cand = Math.floor(Math.random() * (max - min + 1)) + min;

		if (array.length > 0) {
			if (array.some(v => Math.abs(cand - v) < thresh)) return genCode(min, max, array, thresh);
		}

		return cand;
	}

</script>

</body>

</html>
